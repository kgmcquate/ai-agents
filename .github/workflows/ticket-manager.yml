name: Ticket Manager Agent

on:
  workflow_call:
    inputs:
      project_number:
        description: 'GitHub Projects v2 board number (from the URL: /projects/NUMBER)'
        required: true
        type: number
      areas:
        description: 'Comma-separated area tags for conflict detection (e.g. "api,auth,frontend")'
        required: false
        default: 'api,auth,frontend,backend,database,infra,config'
        type: string
    secrets:
      GH_PAT:
        required: true
      ANTHROPIC_API_KEY:
        required: true
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # Checks out the CALLING repo — provides its .github/ticket-manager.yml config
      - name: Checkout calling repo
        uses: actions/checkout@v4

      # Checks out this repo so the script and dependencies are available
      - name: Checkout ticket manager
        uses: actions/checkout@v4
        with:
          repository: kgmcquate/ai-agents
          path: _ticket_manager

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r _ticket_manager/requirements.txt

      - name: Run Ticket Manager
        run: python _ticket_manager/scripts/ticket_manager.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          AREAS: ${{ inputs.areas }}
