name: Worker Agent

on:
  workflow_call:
    inputs:
      project_number:
        description: 'GitHub Projects v2 board number (from the URL: /projects/NUMBER)'
        required: true
        type: number
      areas:
        description: 'Comma-separated area tags (e.g. "api,auth,frontend")'
        required: false
        default: 'api,auth,frontend,backend,database,infra,config'
        type: string
      test_command:
        description: 'Shell command to run the test suite, e.g. "pytest" or "npm test". Leave blank to skip wrapper-level verification (agent still runs tests internally).'
        required: false
        default: ''
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PROJECTS_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      project_number:
        description: 'GitHub Projects v2 board number'
        required: true
        type: number
      test_command:
        description: 'Test command (optional)'
        required: false
        default: ''
        type: string

jobs:
  worker:
    strategy:
      matrix:
        worker_id: [1, 2]
      fail-fast: false  # one worker failing doesn't kill the other
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Check out the calling repo — this is the codebase the agent will work on.
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          path: target_repo
          fetch-depth: 0        # full history so git diff origin/HEAD works
          token: ${{ secrets.GH_PROJECTS_TOKEN }}

      # Check out ai-agents so we can run the worker script.
      - name: Checkout ai-agents (worker scripts)
        uses: actions/checkout@v4
        with:
          repository: kgmcquate/ai-agents
          path: _worker

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r _worker/requirements.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config --global user.name "Worker Agent"
          git config --global user.email "worker-agent@users.noreply.github.com"

      - name: Run worker agent
        run: python _worker/scripts/worker_agent.py
        env:
          GH_PROJECTS_TOKEN:  ${{ secrets.GH_PROJECTS_TOKEN }}
          GH_TOKEN:           ${{ secrets.GH_PROJECTS_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_OWNER:         ${{ github.repository_owner }}
          REPO_NAME:          ${{ github.event.repository.name }}
          PROJECT_NUMBER:     ${{ inputs.project_number }}
          AREAS:              ${{ inputs.areas }}
          WORKER_ID:          ${{ matrix.worker_id }}
          TARGET_REPO_DIR:    ${{ github.workspace }}/target_repo
          TEST_COMMAND:       ${{ inputs.test_command }}
          ACTIONS_RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
